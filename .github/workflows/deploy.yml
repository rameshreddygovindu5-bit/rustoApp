name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ══════════════════════════════════════════════════════════════════
  # JOB 1: Run all tests (blocks deploy if any fail)
  # ══════════════════════════════════════════════════════════════════
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lms
          POSTGRES_PASSWORD: lms_password
          POSTGRES_DB: rusto_lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout

      - name: Run full test suite
        working-directory: tests
        env:
          DATABASE_URL: sqlite:///lodge_lms_test.db
        run: |
          python -m pytest . \
            --tb=short \
            --no-header \
            -q \
            --timeout=180 \
            -x
        # -x: stop on first failure so CI output is readable

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/.pytest_cache/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════
  # JOB 2: Build Docker images (parallel, cached)
  # ══════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        include:
          - image: backend
            context: backend
            portal: ""
          - image: frontend-pms
            context: frontend
            portal: pms
          - image: frontend-customer
            context: frontend
            portal: customer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        if: matrix.image == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build and push PMS frontend
        if: matrix.image == 'frontend-pms'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            PORTAL=pms
            VITE_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository }}/frontend-pms:latest
            ghcr.io/${{ github.repository }}/frontend-pms:${{ github.sha }}
          cache-from: type=gha,scope=frontend-pms
          cache-to:   type=gha,scope=frontend-pms,mode=max

      - name: Build and push Customer frontend
        if: matrix.image == 'frontend-customer'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            PORTAL=customer
            VITE_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository }}/frontend-customer:latest
            ghcr.io/${{ github.repository }}/frontend-customer:${{ github.sha }}
          cache-from: type=gha,scope=frontend-customer
          cache-to:   type=gha,scope=frontend-customer,mode=max

  # ══════════════════════════════════════════════════════════════════
  # JOB 3: Deploy to EC2
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: production

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      APP_DIR:  /opt/rusto-lms

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          [ -z "${EC2_HOST}" ] && { echo "✗ EC2_HOST secret missing"; exit 1; }
          [ -z "${SSH_KEY}" ]  && { echo "✗ EC2_SSH_KEY secret missing"; exit 1; }
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare EC2 directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "${EC2_USER}@${EC2_HOST}" \
              "sudo mkdir -p ${APP_DIR} && sudo chown -R ${EC2_USER}:${EC2_USER} ${APP_DIR}"

      - name: Sync code to EC2
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='*.sqlite' \
            --exclude='backend/uploads/' \
            --exclude='backend/logs/' \
            --exclude='backend/backups/' \
            --exclude='.env*' \
            --exclude='*.pem' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${EC2_USER}@${EC2_HOST}:${APP_DIR}/"

      - name: Deploy on EC2
        env:
          SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "${EC2_USER}@${EC2_HOST}" bash << 'REMOTE'
            set -euo pipefail
            cd /opt/rusto-lms

            # Verify production env exists
            [ -f .env.production ] || {
              echo "✗ .env.production missing — run ec2-bootstrap.sh first"
              exit 1
            }

            # Stop host nginx if running
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true

            # Bring old stack down
            docker compose -f docker-compose.prod.yml --env-file .env.production down --remove-orphans || true

            # Free disk space
            echo "=== Disk before prune ===" && df -h /
            docker system prune -af --volumes=false
            docker builder prune -af
            sudo apt-get clean
            sudo journalctl --vacuum-size=50M || true
            echo "=== Disk after prune ===" && df -h /

            # Check free space (need 2 GB)
            FREE_KB=$(df -P / | awk 'NR==2{print $4}')
            FREE_MB=$((FREE_KB / 1024))
            echo "Free: ${FREE_MB} MB"
            [ "$FREE_MB" -ge 2000 ] || {
              echo "✗ Only ${FREE_MB} MB free. Need 2000 MB."
              echo "  Grow EBS root to 30 GB: sudo growpart /dev/xvda 1 && sudo resize2fs /dev/xvda1"
              exit 1
            }

            # Load env and deploy
            set -a; . ./.env.production; set +a
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              build --pull --parallel
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              up -d --remove-orphans

            # Wait for DB then migrate
            echo "Waiting 20s for DB..."
            sleep 20
            docker compose -f docker-compose.prod.yml exec -T db \
              psql -U "${POSTGRES_USER:-lms}" -d "${POSTGRES_DB:-rusto_lms}" \
              -f /migrate.sql || echo "Migration: non-fatal"

            echo "=== Container status ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
          REMOTE

      - name: Wait for backend healthy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "${EC2_USER}@${EC2_HOST}" bash << 'REMOTE'
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' rusto_backend 2>/dev/null || echo unknown)
              [ "$STATUS" = "healthy" ] && { echo "✓ Backend healthy after $((i*5))s"; exit 0; }
              echo "attempt $i/24: status=$STATUS, waiting 5s..."
              sleep 5
            done
            echo "✗ Backend never became healthy"
            docker compose -f /opt/rusto-lms/docker-compose.prod.yml \
              --env-file /opt/rusto-lms/.env.production logs --tail=100 backend || true
            exit 1
          REMOTE

      - name: External health check
        run: |
          for i in $(seq 1 15); do
            if curl -fsS --max-time 5 "http://${EC2_HOST}/health" > /tmp/health.json; then
              echo "=== Health response ===" && cat /tmp/health.json
              echo "" && echo "✓ Deployed successfully at http://${EC2_HOST}"
              exit 0
            fi
            echo "attempt $i/15: not ready, waiting 6s..."
            sleep 6
          done
          echo "✗ Health check failed after 90s"
          exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployed commit ${{ github.sha }} to http://${EC2_HOST}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
