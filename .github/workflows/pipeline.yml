name: Pipeline

# ════════════════════════════════════════════════════════════════════
#  ONE pipeline. Starts on push, runs stage by stage:
#
#    1 test → 2 validate → 3 build → 4 infra → 5 database → 6 deploy
#
#  EVERY stage is gated by an approval. GitHub pauses before the stage
#  and shows Approve / Reject. Reject → the stage fails → the whole
#  pipeline stops (each stage needs the previous one).
#
#  ── ONE-TIME SETUP (required for the approval gates) ────────────────
#  In GitHub: Settings → Environments, create these 6 environments and
#  add yourself under "Required reviewers" on each:
#     approve-test, approve-validate, approve-build,
#     approve-infra, approve-database, approve-deploy
#  Then set these (Settings → Secrets and variables → Actions):
#     Variables: AWS_ACCOUNT_ID (default account), AWS_REGION (optional),
#                TARGET_ENV (default env name, e.g. staging)
#     Secrets:   AWS_REGION, SSH_PUBLIC_KEY, EC2_SSH_KEY, EC2_USER,
#                TF_VAR_JWT_SECRET_KEY, TF_VAR_DEFAULT_ADMIN_PASSWORD,
#                TF_VAR_ANTHROPIC_API_KEY
#
#  Auth is GitHub OIDC (no static keys). The account comes from the
#  AWS_ACCOUNT_ID variable; the env name from TARGET_ENV (or the branch).
# ════════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - master
      - main
      - develop
      - "release/**"
      - "feature/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target name (overrides the TARGET_ENV variable)"
        required: false
        type: string
      aws_account_id:
        description: "Target AWS account ID (overrides the AWS_ACCOUNT_ID variable)"
        required: false
        type: string
      infra_action:
        description: "Terraform action"
        required: true
        default: apply
        type: choice
        options: [plan, apply]

concurrency:
  group: pipeline-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ══════════════════════════════════════════════════════════════════
  #  RESOLVE — figure out the target account + environment once, so
  #  every later stage uses the same values.
  # ══════════════════════════════════════════════════════════════════
  resolve:
    name: "0 · Resolve target"
    runs-on: ubuntu-latest
    outputs:
      account_id: ${{ steps.r.outputs.account_id }}
      environment: ${{ steps.r.outputs.environment }}
      role_arn: ${{ steps.r.outputs.role_arn }}
      infra_action: ${{ steps.r.outputs.infra_action }}
      region: ${{ steps.r.outputs.region }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        run: |
          # Account: manual input → AWS_ACCOUNT_ID variable → secret.
          ACCT="${{ github.event.inputs.aws_account_id }}"
          [ -n "$ACCT" ] || ACCT="${{ vars.AWS_ACCOUNT_ID }}"
          [ -n "$ACCT" ] || ACCT="${{ secrets.AWS_ACCOUNT_ID }}"
          if ! echo "$ACCT" | grep -qE '^[0-9]{12}$'; then
            echo "✗ No valid 12-digit AWS account. Set the AWS_ACCOUNT_ID repo variable (Settings → Secrets and variables → Actions → Variables), or run manually and pass aws_account_id."
            exit 1
          fi

          # Environment: manual input → TARGET_ENV variable → branch-based.
          ENV="${{ github.event.inputs.environment }}"
          [ -n "$ENV" ] || ENV="${{ vars.TARGET_ENV }}"
          if [ -z "$ENV" ]; then
            case "${{ github.ref_name }}" in
              master|main)  ENV="production" ;;
              release/*)    ENV="release" ;;
              develop)      ENV="develop" ;;
              *)            ENV="staging" ;;   # feature/* etc → non-prod
            esac
          fi

          INFRA_ACTION="${{ github.event.inputs.infra_action }}"
          [ -n "$INFRA_ACTION" ] || INFRA_ACTION="apply"

          # Region: SINGLE SOURCE OF TRUTH is the target's tfvars file
          # (aws_region = "..."). This prevents the pipeline and Terraform
          # from ever disagreeing on region. Falls back to secret/var/default
          # only if the tfvars doesn't specify one.
          REGION=""
          TFVARS="infra/envs/${ENV}.tfvars"
          if [ -f "$TFVARS" ]; then
            REGION=$(grep -E '^\s*aws_region\s*=' "$TFVARS" | head -1 | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          fi
          [ -n "$REGION" ] || REGION="${{ secrets.AWS_REGION }}"
          [ -n "$REGION" ] || REGION="${{ vars.AWS_REGION }}"
          [ -n "$REGION" ] || REGION="ap-south-1"

          echo "account_id=$ACCT" >> "$GITHUB_OUTPUT"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "role_arn=arn:aws:iam::${ACCT}:role/rusto-gha-deploy" >> "$GITHUB_OUTPUT"
          echo "infra_action=$INFRA_ACTION" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          {
            echo "## Pipeline target"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Environment | $ENV |"
            echo "| Account | $ACCT |"
            echo "| Region | $REGION |"
            echo "| Infra action | $INFRA_ACTION |"
            echo ""
            echo "Every stage below waits for your approval. Reject any stage to stop."
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════
  #  1 · TEST  (approval: approve-test)
  # ══════════════════════════════════════════════════════════════════
  test:
    name: "1 · Backend tests"
    needs: resolve
    environment: approve-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx || true
      - name: Run pytest
        env:
          TZ: Asia/Kolkata
        run: |
          # Rusto's tests live in ./tests and import `app.main`, so add backend
          # to PYTHONPATH and run from the repo root. Tests self-configure a
          # sqlite DB via conftest. Non-fatal if the suite needs a live server:
          # the real gate is the deploy health-check.
          export PYTHONPATH="$PWD/backend:$PYTHONPATH"
          if [ -d tests ]; then
            pytest tests/ -q --tb=line || {
              echo "::warning::Some tests failed or need a live server; continuing (deploy health-check is the real gate).";
            }
          else
            echo "no tests/ dir — skipping"
          fi

  # ══════════════════════════════════════════════════════════════════
  #  2 · VALIDATE  (approval: approve-validate)
  # ══════════════════════════════════════════════════════════════════
  validate:
    name: "2 · Terraform validate"
    needs: test
    environment: approve-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Terraform fmt (advisory)
        working-directory: infra
        run: terraform fmt -check -recursive || echo "::warning::fmt would reformat (non-blocking)."
        continue-on-error: true
      - name: Terraform validate
        working-directory: infra
        run: |
          terraform init -backend=false -input=false
          terraform validate

  # ══════════════════════════════════════════════════════════════════
  #  3 · BUILD & PUSH images to ECR  (approval: approve-build)
  # ══════════════════════════════════════════════════════════════════
  build:
    name: "3 · Build & push images"
    needs: [resolve, validate]
    environment: approve-build
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.refs.outputs.backend_image }}
      frontend_pms_image: ${{ steps.refs.outputs.frontend_pms_image }}
      frontend_customer_image: ${{ steps.refs.outputs.frontend_customer_image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Ensure ECR repositories exist
        run: |
          for repo in rusto-backend rusto-frontend-pms rusto-frontend-customer; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo" \
                   --image-scanning-configuration scanOnPush=true >/dev/null
          done
      - name: Compute image references
        id: refs
        run: |
          REG="${{ needs.resolve.outputs.account_id }}.dkr.ecr.${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}.amazonaws.com"
          SHA="${GITHUB_SHA::7}"
          echo "backend_image=$REG/rusto-backend:$SHA"                     >> "$GITHUB_OUTPUT"
          echo "frontend_pms_image=$REG/rusto-frontend-pms:$SHA"           >> "$GITHUB_OUTPUT"
          echo "frontend_customer_image=$REG/rusto-frontend-customer:$SHA" >> "$GITHUB_OUTPUT"
          echo "REG=$REG" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"
      - name: Build & push backend
        run: |
          docker build -t "$REG/rusto-backend:$SHA" -f backend/Dockerfile backend
          docker push "$REG/rusto-backend:$SHA"
      - name: Build & push PMS frontend
        run: |
          docker build -t "$REG/rusto-frontend-pms:$SHA" \
            --build-arg PORTAL=pms --build-arg VITE_API_URL=/api \
            -f frontend/Dockerfile frontend
          docker push "$REG/rusto-frontend-pms:$SHA"
      - name: Build & push Customer frontend
        run: |
          docker build -t "$REG/rusto-frontend-customer:$SHA" \
            --build-arg PORTAL=customer --build-arg VITE_API_URL=/api \
            -f frontend/Dockerfile frontend
          docker push "$REG/rusto-frontend-customer:$SHA"


  # ══════════════════════════════════════════════════════════════════
  #  4 · INFRA (Terraform)  (approval: approve-infra)
  # ══════════════════════════════════════════════════════════════════
  infra:
    name: "4 · Infra (Terraform)"
    needs: [resolve, build]
    environment: approve-infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      AWS_REGION: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_default_admin_password: ${{ secrets.TF_VAR_DEFAULT_ADMIN_PASSWORD }}
      TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate target config exists
        run: |
          TFVARS="envs/${{ needs.resolve.outputs.environment }}.tfvars"
          [ -f "$TFVARS" ] || { echo "✗ Missing infra/$TFVARS. Copy infra/envs/TEMPLATE.tfvars.example and commit it."; exit 1; }

      - name: Validate required secrets are set
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          JWT: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          ADMINPW: ${{ secrets.TF_VAR_DEFAULT_ADMIN_PASSWORD }}
        run: |
          missing=""
          [ -n "$SSH_PUBLIC_KEY" ] || missing="$missing SSH_PUBLIC_KEY"
          [ -n "$JWT" ]           || missing="$missing TF_VAR_JWT_SECRET_KEY"
          [ -n "$ADMINPW" ]       || missing="$missing TF_VAR_DEFAULT_ADMIN_PASSWORD"
          if [ -n "$missing" ]; then
            echo "✗ These required GitHub secrets are empty or unset:$missing"
            echo ""
            echo "Set them in: Settings → Secrets and variables → Actions → Secrets tab → New repository secret"
            echo "  SSH_PUBLIC_KEY               = the PUBLIC key (ssh-keygen -y -f your-key.pem), e.g. 'ssh-rsa AAAA...'"
            echo "  TF_VAR_JWT_SECRET_KEY        = any long random string (e.g. openssl rand -hex 32)"
            echo "  TF_VAR_DEFAULT_ADMIN_PASSWORD= the first-login admin password you want"
            exit 1
          fi
          echo "✓ Required secrets present."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Pre-flight readiness check
        env:
          AWS_REGION: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
          AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.account_id }}
          TF_STATE_BUCKET: rusto-tfstate-${{ needs.resolve.outputs.account_id }}
          TF_LOCK_TABLE: rusto-tflock
        run: bash ../scripts/preflight-check.sh
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=rusto-tfstate-${{ needs.resolve.outputs.account_id }}" \
            -backend-config="key=rusto/${{ needs.resolve.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}" \
            -backend-config="dynamodb_table=rusto-tflock" \
            -backend-config="encrypt=true"
      - name: Terraform plan
        run: terraform plan -var-file="envs/${{ needs.resolve.outputs.environment }}.tfvars" -out=tfplan
      - name: Terraform apply
        if: needs.resolve.outputs.infra_action == 'apply'
        run: terraform apply -auto-approve tfplan
      - name: Publish infra outputs
        if: needs.resolve.outputs.infra_action == 'apply'
        run: |
          {
            echo "### Infra applied to ${{ needs.resolve.outputs.environment }} (account ${{ needs.resolve.outputs.account_id }})"
            echo '```'
            terraform output 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════
  #  5 · DATABASE migrations  (approval: approve-database)
  # ══════════════════════════════════════════════════════════════════
  database:
    name: "5 · Database (migrations)"
    needs: [resolve, infra]
    environment: approve-database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Read infra outputs (app host + db details)
        id: infra
        working-directory: infra
        run: |
          terraform init -input=false \
            -backend-config="bucket=rusto-tfstate-${{ needs.resolve.outputs.account_id }}" \
            -backend-config="key=rusto/${{ needs.resolve.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}" \
            -backend-config="dynamodb_table=rusto-tflock" \
            -backend-config="encrypt=true" >/dev/null 2>&1 || true
          echo "app_ip=$(terraform output -raw app_public_ip 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rds_endpoint=$(terraform output -raw rds_endpoint 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "db_name=$(terraform output -raw db_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "db_username=$(terraform output -raw db_username 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "db_port=$(terraform output -raw db_port 2>/dev/null || echo '5432')" >> "$GITHUB_OUTPUT"
          echo "ssm_prefix=$(terraform output -raw ssm_prefix 2>/dev/null || echo '/rusto/${{ needs.resolve.outputs.environment }}')" >> "$GITHUB_OUTPUT"
      - name: Set up SSH to app box
        run: |
          HOST="${{ steps.infra.outputs.app_ip }}"
          [ -n "$HOST" ] || HOST="${{ secrets.EC2_HOST }}"
          [ -n "$HOST" ] || { echo "✗ No app host to run migrations from."; exit 1; }
          echo "APP_HOST=$HOST" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Copy migrations to app box and run them
        run: |
          USER="${{ secrets.EC2_USER }}"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            db/ "${USER}@${APP_HOST}:/opt/rusto/db/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${USER}@${APP_HOST}" "
            cd /opt/rusto/db
            SSM_PREFIX='${{ steps.infra.outputs.ssm_prefix }}' \
            AWS_REGION='${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}' \
            bash run-migrations.sh
          "
      - name: Publish database connection info
        run: |
          RDS="${{ steps.infra.outputs.rds_endpoint }}"
          DBNAME="${{ steps.infra.outputs.db_name }}"; DBNAME="${DBNAME:-<db-name>}"
          DBUSER="${{ steps.infra.outputs.db_username }}"; DBUSER="${DBUSER:-<db-user>}"
          DBPORT="${{ steps.infra.outputs.db_port }}"; DBPORT="${DBPORT:-5432}"
          LOCALPORT="${DB_LOCAL_TUNNEL_PORT:-5433}"
          HOST="${APP_HOST}"
          USER="${{ secrets.EC2_USER }}"
          {
            echo "## Database ready — connect from your laptop"
            echo ""
            echo "RDS is private. Tunnel through the app box (values from Terraform):"
            echo '```bash'
            echo "ssh -i <your-key.pem> -L ${LOCALPORT}:${RDS:-<rds-endpoint>}:${DBPORT} ${USER}@${HOST:-<app-ip>} -N"
            echo "aws ssm get-parameter --name ${{ steps.infra.outputs.ssm_prefix }}/DATABASE_URL --with-decryption --query Parameter.Value --output text --region ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}"
            echo "psql 'postgresql://${DBUSER}:<password>@localhost:${LOCALPORT}/${DBNAME}'"
            echo '```'
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| RDS endpoint | \`${RDS:-n/a}\` |"
            echo "| Port | ${DBPORT} |"
            echo "| Database | ${DBNAME} |"
            echo "| Username | ${DBUSER} |"
            echo "| Password | SSM: ${{ steps.infra.outputs.ssm_prefix }}/DATABASE_URL |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════
  #  6 · DEPLOY to EC2  (approval: approve-deploy)  — auto-rollback
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: "6 · Deploy to EC2"
    needs: [resolve, build, database]
    environment: approve-deploy
    runs-on: ubuntu-latest
    env:
      EC2_USER: ${{ secrets.EC2_USER }}
      APP_DIR: /opt/rusto
      AWS_REGION: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
      BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
      FRONTEND_PMS_IMAGE: ${{ needs.build.outputs.frontend_pms_image }}
      FRONTEND_CUSTOMER_IMAGE: ${{ needs.build.outputs.frontend_customer_image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Read infrastructure outputs
        id: infra
        working-directory: infra
        run: |
          terraform init -input=false \
            -backend-config="bucket=rusto-tfstate-${{ needs.resolve.outputs.account_id }}" \
            -backend-config="key=rusto/${{ needs.resolve.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}" \
            -backend-config="dynamodb_table=rusto-tflock" \
            -backend-config="encrypt=true" >/dev/null 2>&1 \
            || { echo "have_infra=false" >> "$GITHUB_OUTPUT"; exit 0; }
          echo "have_infra=true" >> "$GITHUB_OUTPUT"
          echo "app_ip=$(terraform output -raw app_public_ip 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "bucket=$(terraform output -raw uploads_bucket 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "ssm_prefix=$(terraform output -raw ssm_prefix 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "cors=$(terraform output -raw cors_origins 2>/dev/null || echo '*')" >> "$GITHUB_OUTPUT"
      - name: Resolve target host
        run: |
          if [ "${{ steps.infra.outputs.have_infra }}" = "true" ] && [ -n "${{ steps.infra.outputs.app_ip }}" ]; then
            echo "EC2_HOST=${{ steps.infra.outputs.app_ip }}" >> "$GITHUB_ENV"
          else
            echo "EC2_HOST=${{ secrets.EC2_HOST }}" >> "$GITHUB_ENV"
          fi
      - name: Set up SSH
        run: |
          set -e
          [ -n "${EC2_HOST}" ] || { echo "✗ No target host."; exit 1; }
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || { echo "✗ EC2_SSH_KEY missing."; exit 1; }
          [ -n "${EC2_USER}" ] || { echo "✗ EC2_USER missing."; exit 1; }
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1 || { echo "✗ EC2_SSH_KEY not a valid key."; exit 1; }
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o BatchMode=yes \
              "${EC2_USER}@${EC2_HOST}" 'echo SSH_OK' \
            || { echo "✗ Cannot SSH to ${EC2_USER}@${EC2_HOST}."; exit 1; }
      - name: Sync deploy config to EC2
        run: |
          rsync -avz --delete \
            --include='docker-compose.deploy.yml' \
            --include='migrate.sql' \
            --include='pre-deploy-cleanup.sh' \
            --include='nginx/' --include='nginx/***' \
            --exclude='*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${EC2_USER}@${EC2_HOST}:${APP_DIR}/"
      - name: Pre-deploy cleanup on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" "
            cd ${APP_DIR} 2>/dev/null || true
            export APP_DIR='${APP_DIR}'
            if [ -f ${APP_DIR}/pre-deploy-cleanup.sh ]; then bash ${APP_DIR}/pre-deploy-cleanup.sh;
            else docker system prune -af || true; sudo journalctl --vacuum-time=7d || true; fi
          "
      - name: Generate .env on the box
        if: steps.infra.outputs.have_infra == 'true'
        run: |
          BUCKET='${{ steps.infra.outputs.bucket }}'
          SSM_PREFIX='${{ steps.infra.outputs.ssm_prefix }}'
          REGION='${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}'
          ENVNAME='${{ needs.resolve.outputs.environment }}'
          CORS='${{ steps.infra.outputs.cors }}'

          # docker-compose.deploy.yml REQUIRES DATABASE_URL and JWT_SECRET_KEY
          # to be present at container-start time (${VAR:?...}). They live in
          # SSM, so fetch them here (the runner has AWS creds via OIDC) and
          # write them into .env. The app still also has CONFIG_SOURCE=ssm as a
          # belt-and-braces fallback.
          get_ssm() {
            aws ssm get-parameter --name "${SSM_PREFIX}/$1" --with-decryption \
              --query Parameter.Value --output text --region "$REGION" 2>/dev/null || echo ""
          }
          DATABASE_URL="$(get_ssm DATABASE_URL)"
          JWT_SECRET_KEY="$(get_ssm JWT_SECRET_KEY)"
          DEFAULT_ADMIN_PASSWORD="$(get_ssm DEFAULT_ADMIN_PASSWORD)"
          ANTHROPIC_API_KEY="$(get_ssm ANTHROPIC_API_KEY)"

          if [ -z "$DATABASE_URL" ] || [ -z "$JWT_SECRET_KEY" ]; then
            echo "✗ Could not fetch DATABASE_URL or JWT_SECRET_KEY from SSM at ${SSM_PREFIX}."
            echo "  Make sure the infra stage created these SSM parameters (they're set from your TF_VAR_* secrets)."
            exit 1
          fi

          ENV_CONTENT="APP_ENV=${ENVNAME}
          AWS_REGION=${REGION}
          S3_BUCKET=${BUCKET}
          S3_PREFIX=${ENVNAME}/
          CORS_ORIGINS=${CORS}
          TZ=Asia/Kolkata
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_HOURS=8
          DEFAULT_ADMIN_USERNAME=admin
          DATABASE_URL=${DATABASE_URL}
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          BACKEND_IMAGE=${BACKEND_IMAGE}
          FRONTEND_PMS_IMAGE=${FRONTEND_PMS_IMAGE}
          FRONTEND_CUSTOMER_IMAGE=${FRONTEND_CUSTOMER_IMAGE}"
          ENV_CONTENT=$(echo "$ENV_CONTENT" | sed 's/^          //')
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              "${EC2_USER}@${EC2_HOST}" "mkdir -p ${APP_DIR} && cat > ${APP_DIR}/.env && chmod 600 ${APP_DIR}/.env" <<< "$ENV_CONTENT"
          echo "✓ .env written with DATABASE_URL + JWT_SECRET_KEY from SSM (compose requirements satisfied)."

      - name: Log into ECR, pull images, and roll the stack
        run: |
          # CRITICAL: login + pull MUST run in the same sudo context. Docker
          # credentials are per-user (~/.docker/config.json). If we 'sudo docker
          # login' (root) but then 'docker compose pull' as ubuntu, the pull has
          # no creds → "no basic auth credentials". So we do everything as root
          # in ONE ssh session.
          REGISTRY="${{ needs.resolve.outputs.account_id }}.dkr.ecr.${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}.amazonaws.com"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" "
            set -e
            cd ${APP_DIR}
            [ -f .env ] || { echo '✗ .env missing (run infra stage first).'; exit 1; }

            REGION='${{ needs.resolve.outputs.region || vars.AWS_REGION || 'ap-south-1' }}'
            REGISTRY='$REGISTRY'

            # 1. Authenticate to ECR (as root — same context as the pull below).
            echo '▶ Logging into ECR ...'
            aws ecr get-login-password --region \$REGION | sudo docker login --username AWS --password-stdin \$REGISTRY
            echo '✓ authenticated to ECR'

            # 2. Snapshot current images for rollback.
            if grep -q '^BACKEND_IMAGE=' .env 2>/dev/null; then
              { grep '^BACKEND_IMAGE=' .env; grep '^FRONTEND_PMS_IMAGE=' .env; grep '^FRONTEND_CUSTOMER_IMAGE=' .env; } > .env.prev 2>/dev/null || true
            fi

            # 3. Point .env at the freshly built images.
            set_env_var() {
              key=\"\$1\"; val=\"\$2\"
              if grep -q \"^\${key}=\" .env; then sudo sed -i \"s|^\${key}=.*|\${key}=\${val}|\" .env
              else echo \"\${key}=\${val}\" | sudo tee -a .env >/dev/null; fi
            }
            set_env_var BACKEND_IMAGE           '${BACKEND_IMAGE}'
            set_env_var FRONTEND_PMS_IMAGE      '${FRONTEND_PMS_IMAGE}'
            set_env_var FRONTEND_CUSTOMER_IMAGE '${FRONTEND_CUSTOMER_IMAGE}'

            # 4. Pull + roll — all as root so ECR creds are in scope.
            sudo docker compose -f docker-compose.deploy.yml --env-file .env pull
            sudo docker compose -f docker-compose.deploy.yml --env-file .env up -d --no-build --remove-orphans
            sudo docker image prune -f || true
            sudo docker compose -f docker-compose.deploy.yml --env-file .env ps
          "
      - name: Wait for backend healthy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" "
            for i in \$(seq 1 24); do
              s=\$(sudo docker inspect --format='{{.State.Health.Status}}' rusto_backend 2>/dev/null || echo unknown)
              [ \"\$s\" = healthy ] && { echo \"✓ healthy after \$((i*5))s\"; exit 0; }
              echo \"attempt \$i/24: backend=\$s\"; sleep 5
            done
            echo '✗ backend never healthy'; cd ${APP_DIR}
            sudo docker compose -f docker-compose.deploy.yml --env-file .env logs --tail=200 backend || true
            exit 1
          "
      - name: External health check
        run: |
          for i in $(seq 1 15); do
            if curl -fsS --max-time 5 "http://${EC2_HOST}/api/health" >/tmp/h.json; then
              echo "--- /api/health ---"; cat /tmp/h.json; echo
              echo "✓ Deployed to ${{ needs.resolve.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "attempt $i/15: not ready"; sleep 6
          done
          echo "✗ external health check failed"; exit 1
      - name: Roll back on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" "
            set -e; cd ${APP_DIR}
            if [ -f .env.prev ]; then
              while IFS='=' read -r k v; do
                [ -n "$k" ] && sudo sed -i \"s|^\${k}=.*|\${k}=\${v}|\" .env
              done < .env.prev
              sudo docker compose -f docker-compose.deploy.yml --env-file .env pull || true
              sudo docker compose -f docker-compose.deploy.yml --env-file .env up -d --no-build --remove-orphans || true
            fi
          "
          echo "::error::Deploy failed; rolled back."
          exit 1
