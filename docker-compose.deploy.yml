# ════════════════════════════════════════════════════════════════════
# Rusto LMS — Deploy stack (pulls pre-built images from ECR).
#
# Database is Amazon RDS (not a container). Images are built + pushed by
# the pipeline; here we only pull and run. Two frontends (PMS + customer)
# are built from the same source with different PORTAL build-args, so they
# are two separate images.
#
# All secrets come from the .env the pipeline writes on the box.
# ════════════════════════════════════════════════════════════════════
services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set in .env}
    container_name: rusto_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL (RDS endpoint) must be set in .env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD must be set in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_PROVIDER: ${AGENT_PROVIDER:-auto}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Rusto LMS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      TZ: ${TZ:-Asia/Kolkata}
      PYTHONUNBUFFERED: "1"
    volumes:
      - lms_uploads:/app/uploads
      - lms_logs:/app/logs
      - lms_backups:/app/backups
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "5" }

  frontend_pms:
    image: ${FRONTEND_PMS_IMAGE:?FRONTEND_PMS_IMAGE must be set in .env}
    container_name: rusto_frontend_pms
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  frontend_customer:
    image: ${FRONTEND_CUSTOMER_IMAGE:?FRONTEND_CUSTOMER_IMAGE must be set in .env}
    container_name: rusto_frontend_customer
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  nginx:
    image: nginx:1.25-alpine
    container_name: rusto_nginx
    restart: unless-stopped
    depends_on:
      - frontend_pms
      - frontend_customer
      - backend
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - lms_uploads:/var/www/uploads:ro
    ports:
      - "80:80"
      - "3001:3001"
      - "443:443"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  lms_uploads:
  lms_logs:
  lms_backups:
