# ════════════════════════════════════════════════════════════════════
# Rusto LMS — Local Development
#
# Starts THREE portals on separate ports:
#   http://localhost:3000  — Combined (PMS + Customer) [default]
#   http://localhost:3001  — PMS portal only
#   http://localhost:3002  — Customer portal only
#
# All portals share the same backend (port 8000).
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f backend
#
# Environment: copy .env.example → .env and fill in secrets.
# ════════════════════════════════════════════════════════════════════
version: "3.9"

services:
  # ── Database (PostgreSQL) ────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rusto_db_dev
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: rusto_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d rusto_lms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Backend (FastAPI) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rusto_backend_dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lms:lms_password@db:5432/rusto_lms
      JWT_SECRET_KEY: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: "8"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173"
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: Admin@1234
      # Optional: set these to enable integrations
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TZ: Asia/Kolkata
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Combined Frontend (PMS + Customer) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORTAL: combined
        VITE_API_URL: /api
    container_name: rusto_frontend_dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

  # ── PMS-only Frontend ────────────────────────────────────────────
  frontend_pms:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORTAL: pms
        VITE_API_URL: /api
    container_name: rusto_frontend_pms_dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:80"
    restart: unless-stopped

  # ── Customer-only Frontend ───────────────────────────────────────
  frontend_customer:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORTAL: customer
        VITE_API_URL: /api
    container_name: rusto_frontend_customer_dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3002:80"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  logs_data:
