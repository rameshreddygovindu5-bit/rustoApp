# ════════════════════════════════════════════════════════════════════
# Local development docker-compose.
# Uses simple credentials and exposes Postgres on 5432 for tooling.
# For production, use docker-compose.prod.yml + .env.production.
#
#   docker compose up -d --build
#   open http://localhost:3000   ← frontend
#         http://localhost:8000/docs   ← backend Swagger
# ════════════════════════════════════════════════════════════════════

services:
  db:
    image: postgres:15-alpine
    container_name: rusto_lms_db_dev
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: rusto_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d rusto_lms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rusto_lms_backend_dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lms:lms_password@db:5432/rusto_lms
      JWT_SECRET_KEY: dev-only-change-in-prod-jwt-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: "8"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: Admin@1234
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: "1"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: rusto_lms_frontend_dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  logs_data:
