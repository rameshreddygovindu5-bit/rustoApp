# ────────────────────────────────────────────────────────────────────
# nginx config inside the frontend container.
# Serves the Vite-built React bundle and proxies /api → backend.
# Used in BOTH local development (docker-compose.yml) and production
# (the outer nginx container in docker-compose.prod.yml proxies to this).
# ────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a variable for the upstream + a resolver
    # makes nginx resolve "backend" lazily at request time instead of at
    # startup — so this container starts even if the backend isn't up yet
    # (otherwise nginx exits with "host not found in upstream" and serves
    # nothing). In production the OUTER nginx handles /api anyway.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream "http://backend:8000";

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json
               image/svg+xml;

    client_max_body_size 25M;

    # ── index.html: NEVER cache ─────────────────────────────────────
    # Critical: without this, the browser caches index.html and keeps
    # loading the OLD hashed asset names even after a new build is
    # deployed — users would see no changes until they hard-refresh.
    # The hashed asset files (immutable) can still be cached for 1y;
    # only the HTML entry-point needs to always be revalidated.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # ── PWA: service worker MUST NOT be cached at the edge ─────────
    # Browsers internally re-fetch sw.js on every navigation to detect
    # updates, but a CDN/edge caching it would prevent users ever
    # seeing the new build. Keep this above the catch-all `location /`.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires -1;
        try_files $uri =404;
    }

    # ── PWA manifest: short TTL (5min) so name/icon changes propagate ─
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=300" always;
        add_header Content-Type "application/manifest+json" always;
        try_files $uri =404;
    }

    # ── PWA offline fallback: short TTL so we can ship copy changes ─
    location = /offline.html {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ── PWA icons: longer TTL but NOT immutable (they aren't hashed) ─
    location /icons/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # ── React SPA routing — serve index.html for any unknown path ───
    location / {
        # Apply the same no-cache to any path that resolves to index.html
        # (single-page-app routes like /dashboard, /rooms, /checkins).
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy (used in local dev) ───────────────────────
    # In production the OUTER nginx container handles /api/ before
    # this one ever sees it. This block exists so `docker compose up`
    # works without an extra nginx layer.
    location /api/ {
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;

        # SSE friendliness for the AI agent endpoint
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /uploads/ {
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
    }

    location /docs         { proxy_pass $backend_upstream$request_uri; }
    location /openapi.json { proxy_pass $backend_upstream$request_uri; }

    # ── Static asset caching ────────────────────────────────────────
    # Vite produces hashed filenames (e.g. index-CHqzknnL.css), so it's
    # safe to cache them aggressively — when the content changes, the
    # filename changes too, and index.html (above) references the new one.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}
