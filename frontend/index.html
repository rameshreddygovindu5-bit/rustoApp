<!DOCTYPE html>
<html lang="en" class="antialiased scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="build-timestamp" content="2026-05-29 20:20:00 UTC" />
    
    <title>Rusto — Travel Anywhere. Rest Everywhere.</title>
    <meta name="description" content="Advanced luxury lodge management system and premium traveler booking platform across India." />

    <link rel="manifest" href="/manifest.webmanifest" />
    
    <meta name="theme-color" content="#0B252C" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rusto" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* Enforcing typography and layout rules for the entire app ecosystem */
      :root {
        --font-sans: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        --font-display: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: var(--font-sans);
        background-color: #0B252C; /* Stargazer misty deep teal base canvas */
        color: #F8FAFC;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Native-like scrolling configuration for advanced dashboard and cards */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.03);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      /* Cinematic Initial Core App Boot Loader */
      #app-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #0B252C;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s;
      }

      .loader-container {
        position: relative;
        width: 180px;
        height: 180px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* High-end radial spinner on hardware-accelerated stack */
      .loader-spinner {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: rgba(214, 154, 128, 0.4);
        border-right-color: rgba(214, 154, 128, 0.1);
        border-bottom-color: rgba(214, 154, 128, 0.05);
        animation: spinHardware 1.2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        will-change: transform;
        transform: translateZ(0); /* Force GPU acceleration */
      }

      @keyframes spinHardware {
        0% { transform: rotate(0deg) translateZ(0); }
        100% { transform: rotate(360deg) translateZ(0); }
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 2;
      }

      .loader-brand {
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-indent: 0.15em;
        background: linear-gradient(135deg, #FFFFFF 0%, #D69A80 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .loader-tagline {
        font-family: var(--font-sans);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-indent: 0.28em;
        color: rgba(214, 154, 128, 0.7);
        text-transform: uppercase;
        animation: taglineBreathe 2s ease-in-out infinite;
      }

      @keyframes taglineBreathe {
        0%, 100% { opacity: 0.5; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1.02); }
      }

      .app-loaded #app-preloader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  
  <body data-build-ts="2026-05-29 20:20:00 UTC">
    
    <div id="app-preloader">
      <div class="loader-container">
        <div class="loader-spinner"></div>
        <div class="loader-content">
          <div class="loader-brand">RUSTO</div>
          <div class="loader-tagline">TRAVEL & REST</div>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js", { scope: "/" })
            .then((reg) => {
              const fireUpdateAvailable = (worker) => {
                window.dispatchEvent(new CustomEvent("sw:update-available", {
                  detail: { worker, registration: reg },
                }));
              };
              if (reg.waiting) fireUpdateAvailable(reg.waiting);
              reg.addEventListener("updatefound", () => {
                const installing = reg.installing;
                if (!installing) return;
                installing.addEventListener("statechange", () => {
                  if (installing.state === "installed" && navigator.serviceWorker.controller) {
                    fireUpdateAvailable(installing);
                  }
                });
              });
            })
            .catch((err) => console.warn("[SW] Global ecosystem registration failed:", err));

          let refreshing = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }

      // Automatically strip the preloader shield once React successfully initiates layout injection
      window.addEventListener('DOMContentLoaded', () => {
        // Delayed slightly to yield thread processing to React execution engine
        setTimeout(() => {
          document.body.classList.add('app-loaded');
        }, 150);
      });
    </script>
  </body>
</html>
