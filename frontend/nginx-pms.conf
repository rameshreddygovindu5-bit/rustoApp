# nginx config inside the PMS frontend container.
# PMS is served under /pms/ (vite base: '/pms/'), so files live under
# /usr/share/nginx/html/pms/ and the SPA fallback targets /pms/index.html.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream "http://backend:8000";

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json
               image/svg+xml;
    client_max_body_size 25M;

    # Health check for the container (docker HEALTHCHECK hits /).
    location = / {
        return 200 "pms-ok\n";
        add_header Content-Type text/plain;
    }

    # PMS SPA under /pms/ — fall back to the PMS index for client routes.
    location /pms/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri $uri/ /pms/index.html;
    }
    location = /pms {
        return 301 /pms/;
    }

    # Static assets (hashed → cache hard).
    location ~* ^/pms/assets/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # /api proxy for local dev (outer nginx handles it in production).
    location /api/ {
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
