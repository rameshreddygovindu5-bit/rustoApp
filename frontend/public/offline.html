<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0F1B33"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <title>Offline — Rusto</title>
  <style>
    /* Inline-only — this page must work with zero network.
       Colors match the canonical navy + gold + ink palette in
       tailwind.config.js so the offline screen feels like a natural
       continuation of the brand. */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201, 168, 76, 0.18) 0%, transparent 60%),
        linear-gradient(135deg, #0A1224 0%, #0F1B33 30%, #1B2A4A 60%, #243557 100%);
      color: rgba(255, 255, 255, 0.85);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(201, 168, 76, 0.18);
      border-radius: 24px;
      padding: 40px 28px;
    }
    .mark {
      width: 72px; height: 72px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #E2C470, #A8873C);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(226, 196, 112, 0.4),
                   0 8px 24px rgba(201, 168, 76, 0.35);
      animation: breathe 3.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.05); opacity: 0.92; }
    }
    .mark svg { width: 44px; height: 44px; color: #0F1B33; }
    .eyebrow {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 700; color: #C9A84C; margin-bottom: 8px;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px; font-weight: 700; margin: 0 0 12px;
      color: #ffffff;
    }
    p { font-size: 15px; line-height: 1.5; color: rgba(255, 255, 255, 0.7); margin: 0 0 24px; }
    button {
      font-family: inherit; font-size: 14px; font-weight: 600;
      background: linear-gradient(135deg, #E2C470, #C9A84C);
      color: #0F1B33;
      border: none; cursor: pointer;
      padding: 12px 24px; border-radius: 12px;
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(201, 168, 76, 0.45); }
    button:active { transform: translateY(0); }
    .hint { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-top: 20px; }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444; margin-right: 6px; vertical-align: middle;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">
      <!-- Rusto Horizon Path mark — two peaks + sun + hammock.
           Inline so it renders without network. Geometry matches
           src/components/RustoLogo/RustoLogo.jsx. -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="7" r="2.4" fill="currentColor"/>
        <path d="M 4 32 L 14 32 L 19 18 L 24 32 L 29 22 L 34 32 L 44 32"
              fill="none" stroke="currentColor" stroke-width="2.6"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 12 42 Q 24 50, 36 42"
              fill="none" stroke="currentColor" stroke-width="2.4"
              stroke-linecap="round"/>
      </svg>
    </div>
    <div class="eyebrow">Rusto</div>
    <h1>You're offline</h1>
    <p>We can't reach the network right now. Check your connection and try again — your data is safe.</p>
    <button onclick="window.location.reload()">↻ Try again</button>
    <div class="hint"><span class="status-dot"></span>No connection</div>
  </main>
  <script>
    // Auto-retry: as soon as the browser sees the connection is back,
    // refresh the page. Avoids the user having to tap the button.
    window.addEventListener("online", () => window.location.reload());
  </script>
</body>
</html>
