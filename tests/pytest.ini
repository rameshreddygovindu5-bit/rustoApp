[pytest]
# ── Warning filters ────────────────────────────────────────────────────────
# Suppress deprecation warnings from third-party packages we cannot modify.
# Our own code warnings are still shown (no blanket ignore).
filterwarnings =
    # SQLAlchemy 2.0 declarative_base moved; we use the new import already
    ignore::sqlalchemy.exc.MovedIn20Warning
    ignore::DeprecationWarning:sqlalchemy.*
    # Passlib/bcrypt version detection noise
    ignore::UserWarning:passlib.*
    # jose JWT library uses datetime.utcnow() internally
    ignore::DeprecationWarning:jose.*
    # openpyxl uses datetime.utcnow() internally
    ignore::DeprecationWarning:openpyxl.*
    # websockets legacy layer used by uvicorn
    ignore::DeprecationWarning:websockets.*
    # APScheduler
    ignore::DeprecationWarning:apscheduler.*
    # Uvicorn internal
    ignore::DeprecationWarning:uvicorn.*
    # Python 3.12 datetime.utcnow from any third-party
    ignore:.*datetime.datetime.utcnow.*:DeprecationWarning:jose
    ignore:.*datetime.datetime.utcnow.*:DeprecationWarning:openpyxl
    # Starlette/FastAPI internals
    ignore::DeprecationWarning:starlette.*
    # Test functions that return a value (non-critical)
    ignore::pytest.PytestReturnNotNoneWarning
    # Pydantic v1-compat shims
    ignore::DeprecationWarning:pydantic.*
