# ════════════════════════════════════════════════════════════════════
# Rusto LMS — outer nginx (IP-only, no domain needed)
#
# Two separate single-page apps share one server. To avoid their
# /assets/ paths colliding, each gets its OWN port with a clean root:
#
#   Customer booking (guests)  →  http://YOUR_IP         (port 80)
#   PMS / lodge staff login    →  http://YOUR_IP:3001    (port 3001)
#
# Each SPA is served at the root of its port, so no base-path rewriting,
# no asset collisions, no sub-directory juggling. This is the simplest
# arrangement that reliably works for two root-built SPAs on one host.
# ════════════════════════════════════════════════════════════════════

upstream rusto_backend  { server backend:8000;         keepalive 32; }
upstream rusto_pms      { server frontend_pms:80;      keepalive 16; }
upstream rusto_customer { server frontend_customer:80; keepalive 16; }

limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=120r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=20r/m;

# Shared proxy settings (kept in one place via a map-free include style).
# ── CUSTOMER BOOKING — port 80 (default public site) ─────────────────
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25M;
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location = /health {
        proxy_pass http://rusto_backend/api/health;
        access_log off;
    }

    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass         http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass         http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://rusto_backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Everything else → customer SPA (served at its own root).
    location / {
        proxy_pass         http://rusto_customer;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── PMS / LODGE STAFF — port 3001 ────────────────────────────────────
server {
    listen 3001;
    server_name _;

    client_max_body_size 25M;
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location = /health {
        proxy_pass http://rusto_backend/api/health;
        access_log off;
    }

    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass         http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass         http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://rusto_backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Everything else → PMS SPA (served at its own root).
    location / {
        proxy_pass         http://rusto_pms;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
