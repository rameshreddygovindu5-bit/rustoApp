# ────────────────────────────────────────────────────────────────────
# Reverse proxy for Udumula's Grand LMS (containerized nginx).
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf.
# ────────────────────────────────────────────────────────────────────

upstream lms_backend  { server backend:8000; }
upstream lms_frontend { server frontend:80;  }

# Cap how much nginx will buffer in memory before falling back to disk
client_body_buffer_size 16k;

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 25M;

    # Gzip on text-y responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss
               image/svg+xml;

    # ── API ──────────────────────────────────────────────────────────
    # Trailing slash matters: /api/foo → http://backend:8000/api/foo
    location /api/ {
        proxy_pass http://lms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;

        # SSE / long-running streams (AI agent /api/agent/chat)
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Uploads (served by backend StaticFiles mount) ───────────────
    location /uploads/ {
        proxy_pass http://lms_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API docs (handy for debugging) ──────────────────────────────
    location /docs         { proxy_pass http://lms_backend; }
    location /redoc        { proxy_pass http://lms_backend; }
    location /openapi.json { proxy_pass http://lms_backend; }

    # ── External health probe (ALB / GH Actions / curl) ─────────────
    location = /health {
        proxy_pass http://lms_backend/api/health;
        access_log off;
    }

    # ── Frontend (Vite-built static via the frontend container) ─────
    location / {
        proxy_pass http://lms_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
