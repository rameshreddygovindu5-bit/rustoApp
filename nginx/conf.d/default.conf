# ════════════════════════════════════════════════════════════════════
# Rusto LMS — Production Nginx
# Routes by Host header:
#   pms.yourdomain.com    → PMS portal (lodge staff)
#   book.yourdomain.com   → Customer portal (guests)
#   Any other domain      → Customer portal (default)
#
# All domains share the same backend API.
# Replace DOMAIN_PMS and DOMAIN_CUSTOMER with real domain names.
# ════════════════════════════════════════════════════════════════════

upstream rusto_backend     { server backend:8000;           keepalive 32; }
upstream rusto_pms         { server frontend_pms:80;        keepalive 16; }
upstream rusto_customer    { server frontend_customer:80;   keepalive 16; }

# ── Rate limiting zones ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# ── Security defaults ─────────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Health probe (load balancer / GitHub Actions)
    location = /health {
        proxy_pass http://rusto_backend/api/health;
        access_log off;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── PMS Portal (HTTPS) ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name pms.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/pms.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pms.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 25M;
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
    }

    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://rusto_pms;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Customer Portal (HTTPS) ───────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    server_name book.yourdomain.com yourdomain.com _;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 25M;
    gzip on; gzip_vary on; gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://rusto_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /health {
        proxy_pass http://rusto_backend/api/health;
        access_log off;
    }

    location / {
        proxy_pass http://rusto_customer;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
