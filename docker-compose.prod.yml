# ════════════════════════════════════════════════════════════════════
# Rusto LMS — Production Stack (AWS EC2)
#
# Architecture:
#   nginx (443/80) → routes by domain/path:
#     pms.domain.com   → frontend_pms  (PMS portal)
#     book.domain.com  → frontend_customer (Customer portal)
#     *.domain.com/api → backend
#
# Deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Required .env.production vars — see .env.production.example
# ════════════════════════════════════════════════════════════════════
version: "3.9"

services:
  # ── Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rusto_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rusto_lms}
    volumes:
      - lms_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./migrate.sql:/migrate.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms} -d ${POSTGRES_DB:-rusto_lms}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rusto_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      # AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_PROVIDER: ${AGENT_PROVIDER:-auto}
      # SMS
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Rusto LMS}
      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      TZ: ${TZ:-Asia/Kolkata}
      PYTHONUNBUFFERED: "1"
    volumes:
      - lms_uploads:/app/uploads
      - lms_logs:/app/logs
      - lms_backups:/app/backups
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "5" }

  # ── PMS Portal ───────────────────────────────────────────────────
  frontend_pms:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORTAL: pms
        VITE_API_URL: /api
    container_name: rusto_frontend_pms
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    # Uncomment to access PMS directly without a domain (http://YOUR_IP:3001)
    # ports:
    #   - "3001:80"
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  # ── Customer Portal ──────────────────────────────────────────────
  frontend_customer:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORTAL: customer
        VITE_API_URL: /api
    container_name: rusto_frontend_customer
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    # Uncomment to access Customer portal directly without a domain (http://YOUR_IP:3002)
    # ports:
    #   - "3002:80"
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  # ── Nginx (reverse proxy + SSL) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: rusto_nginx
    restart: unless-stopped
    depends_on:
      - frontend_pms
      - frontend_customer
      - backend
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - lms_uploads:/var/www/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  lms_pgdata:
  lms_uploads:
  lms_logs:
  lms_backups:
